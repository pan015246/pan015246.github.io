<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026年 9/12-9/19 東京旅行行程</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #20242a;
      --muted: #5f6976;
      --line: #d9dde3;
      --paper: #fffdf8;
      --panel: #ffffff;
      --accent: #cc3f55;
      --accent-strong: #9e263d;
      --teal: #167c80;
      --gold: #b77716;
      --shadow: 0 14px 40px rgba(31, 36, 43, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yu Gothic UI", "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(204, 63, 85, 0.07), transparent 40%),
        linear-gradient(180deg, #f8fbfd 0%, var(--paper) 42%, #f2f5f4 100%);
    }

    a {
      color: inherit;
    }

    .hero {
      min-height: 26vh;
      display: grid;
      align-items: end;
      padding: 26px 0 18px;
      background:
        linear-gradient(180deg, rgba(18, 23, 28, 0.18), rgba(18, 23, 28, 0.66)),
        url("https://images.unsplash.com/photo-1542051841857-5f90071e7989?auto=format&fit=crop&w=1800&q=80") center 46% / cover;
      color: white;
    }

    .hero-inner,
    main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding-left: 20px;
      padding-right: 20px;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 0.9rem;
      letter-spacing: 0;
      font-weight: 700;
      color: #ffe0a6;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.75rem, 3.6vw, 3.1rem);
      line-height: 1.08;
      letter-spacing: 0;
      max-width: 920px;
    }

    .hero p {
      max-width: 700px;
      margin: 12px 0 0;
      font-size: 1rem;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.9);
    }

    main {
      padding-top: 28px;
      padding-bottom: 56px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 18px;
    }

    .date-tabs {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 18px;
      margin: 0 0 28px;
    }

    .date-tab {
      min-height: 32px;
      padding: 0;
      border: 0;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      font-weight: 800;
    }

    .date-tab.active {
      border-bottom-color: var(--accent);
      color: var(--accent-strong);
    }

    .date-tab.drop-target {
      color: var(--accent-strong);
      border-bottom-color: var(--accent);
      background: rgba(204, 63, 85, 0.08);
    }

    .date-tab:hover {
      color: var(--accent-strong);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 14px;
      border: 1px solid rgba(32, 36, 42, 0.12);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 6px 18px rgba(31, 36, 43, 0.08);
    }

    .button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .route-preview-button {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      font-size: 0.98rem;
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: 0 10px 24px rgba(204, 63, 85, 0.18);
    }

    .map-route-button {
      background: rgba(22, 124, 128, 0.1);
      color: var(--teal);
      border-color: rgba(22, 124, 128, 0.24);
      font-size: 0.98rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(31, 36, 43, 0.12);
    }

    .layout {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .layout > section {
      order: 2;
    }

    .layout > aside {
      order: 1;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 1.35rem;
      letter-spacing: 0;
    }

    .timeline {
      position: relative;
      display: grid;
      gap: 0;
    }

    .stop-block {
      position: relative;
      padding-bottom: 14px;
    }

    .stop-card {
      position: relative;
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 14px;
      padding: 16px 56px 16px 16px;
      border: 1px solid rgba(32, 36, 42, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .stop-card:hover {
      border-color: rgba(204, 63, 85, 0.24);
      box-shadow: 0 16px 42px rgba(31, 36, 43, 0.14);
      transform: translateY(-1px);
    }

    .stop-card.dragging {
      opacity: 0.56;
      cursor: grabbing;
    }

    .stop-card.drag-over {
      border-color: rgba(204, 63, 85, 0.62);
      box-shadow: 0 16px 42px rgba(204, 63, 85, 0.16);
    }

    .drag-button {
      position: absolute;
      top: 12px;
      right: 12px;
      display: grid;
      place-items: center start;
      width: 36px;
      height: 32px;
      border: 1px solid rgba(32, 36, 42, 0.08);
      border-radius: 999px;
      background: rgba(248, 250, 249, 0.78);
      color: rgba(95, 105, 118, 0.82);
      cursor: grab;
      touch-action: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78);
      transition: color 160ms ease, background 160ms ease, border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .drag-button:hover {
      color: var(--accent-strong);
      background: rgba(204, 63, 85, 0.07);
      border-color: rgba(204, 63, 85, 0.22);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86), 0 8px 18px rgba(31, 36, 43, 0.08);
    }

    .drag-button:active {
      cursor: grabbing;
      transform: scale(0.96);
    }

    .drag-button svg {
      width: 18px;
      height: 18px;
      pointer-events: none;
    }

    .empty-state {
      padding: 28px;
      border: 1px dashed rgba(32, 36, 42, 0.22);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.76);
      color: var(--muted);
      line-height: 1.7;
    }

    .time {
      display: grid;
      gap: 7px;
      place-items: center;
      width: 72px;
      min-height: 58px;
      padding: 6px 5px;
      border-radius: 8px;
      background: #f0f7f7;
      color: var(--teal);
      font-weight: 800;
      line-height: 1.1;
      text-align: center;
    }

    .time-input {
      width: 58px;
      min-height: 31px;
      border: 1px solid rgba(22, 124, 128, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--teal);
      font: inherit;
      font-weight: 900;
      text-align: center;
    }

    .time-input:focus {
      outline: 2px solid rgba(22, 124, 128, 0.24);
      border-color: rgba(22, 124, 128, 0.5);
      background: white;
    }

    .stop h3 {
      margin: 0 0 6px;
      font-size: 1.12rem;
      letter-spacing: 0;
    }

    .tag {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--accent-strong);
      background: rgba(204, 63, 85, 0.1);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .area-tag {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--gold);
      background: rgba(183, 119, 22, 0.12);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .lodging-tag {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--teal);
      background: rgba(22, 124, 128, 0.12);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0 0 10px;
    }

    .stop-subtitle {
      margin: -4px 0 10px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .stay-tag {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(95, 105, 118, 0.1);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .address,
    .note {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .address b {
      color: var(--ink);
    }

    .hours {
      margin: 7px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .hours b {
      color: var(--ink);
    }

    .memo-display {
      margin: 0 0 12px;
      padding: 9px 10px;
      border-left: 3px solid rgba(204, 63, 85, 0.44);
      border-radius: 8px;
      background: rgba(204, 63, 85, 0.06);
      color: var(--muted);
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .memo-modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(32, 36, 42, 0.42);
      z-index: 30;
    }

    .memo-modal.open {
      display: grid;
    }

    .memo-dialog {
      width: min(520px, 100%);
      padding: 18px;
      border-radius: 8px;
      background: white;
      box-shadow: 0 18px 52px rgba(31, 36, 43, 0.22);
    }

    .memo-dialog h2 {
      margin: 0 0 12px;
      font-size: 1.15rem;
    }

    .route-dialog {
      width: min(980px, 100%);
      height: min(720px, calc(100vh - 40px));
      padding: 14px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .route-dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 10px;
    }

    .route-dialog-header h2 {
      margin: 0;
      font-size: 1.15rem;
    }

    .route-modal-list {
      min-height: 0;
      overflow: auto;
      display: grid;
      gap: 0;
      padding: 2px;
    }

    .route-modal-step {
      position: relative;
      display: grid;
      grid-template-columns: 44px 76px minmax(0, 1fr);
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(32, 36, 42, 0.08);
    }

    .route-modal-step::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 34px;
      bottom: -16px;
      width: 2px;
      background: rgba(22, 124, 128, 0.18);
    }

    .route-modal-step:last-child {
      border-bottom: 0;
    }

    .route-modal-step:last-child::before {
      content: none;
    }

    .route-modal-index {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: var(--teal);
      color: white;
      font-size: 0.82rem;
      font-weight: 900;
    }

    .route-modal-time {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 68px;
      min-height: 32px;
      border-radius: 8px;
      background: #f0f7f7;
      color: var(--teal);
      font-weight: 900;
    }

    .route-modal-title {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin: 0 0 5px;
      font-weight: 900;
    }

    .route-panel-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .route-panel-toggle::after {
      content: "+";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 30px;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: rgba(22, 124, 128, 0.1);
      color: var(--teal);
      line-height: 1;
      font-weight: 900;
    }

    .route-panel.open .route-panel-toggle::after {
      content: "-";
    }

    .route-modal-step p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .route-modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 0 0 7px;
    }

    .route-panel-body {
      display: none;
    }

    .route-panel.open .route-panel-body {
      display: block;
    }

    .memo-textarea {
      width: 100%;
      min-height: 150px;
      padding: 10px;
      border: 1px solid rgba(32, 36, 42, 0.16);
      border-radius: 8px;
      color: var(--ink);
      font: inherit;
      line-height: 1.55;
      resize: vertical;
    }

    .memo-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }

    .stop-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .small-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid rgba(32, 36, 42, 0.14);
      background: #fbfbfa;
      color: var(--ink);
      font-size: 0.92rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .small-button:hover {
      border-color: rgba(204, 63, 85, 0.45);
    }

    .small-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    aside {
      position: sticky;
      top: 18px;
      display: grid;
      gap: 14px;
    }

    .lodging-panel {
      order: 1;
    }

    .reminder-panel {
      order: 2;
    }

    .route-panel {
      order: 3;
    }

    .info-panel {
      padding: 18px;
      border: 1px solid rgba(32, 36, 42, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: var(--shadow);
    }

    .info-panel h2 {
      margin: 0 0 12px;
      font-size: 1.24rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .panel-title-route {
      color: var(--accent-strong);
    }

    .panel-title-lodging {
      color: var(--teal);
    }

    .panel-title-reminder {
      color: var(--gold);
    }

    .route-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .route-list li {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      color: var(--muted);
      line-height: 1.5;
    }

    .route-arrow {
      position: relative;
      display: block;
      height: 34px;
      pointer-events: none;
      user-select: none;
    }

    .route-arrow::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 4px;
      width: 2px;
      height: 22px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(204, 63, 85, 0.22), rgba(204, 63, 85, 0.68));
      transform: translateX(-50%);
    }

    .route-arrow::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 19px;
      width: 10px;
      height: 10px;
      border-right: 2px solid rgba(204, 63, 85, 0.72);
      border-bottom: 2px solid rgba(204, 63, 85, 0.72);
      transform: translateX(-50%) rotate(45deg);
    }

    .route-list b {
      color: var(--ink);
    }

    .route-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .route-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 5px 9px;
      border: 1px solid rgba(32, 36, 42, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      font-size: 0.86rem;
      font-weight: 800;
      text-decoration: none;
    }

    .pin {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #fff3df;
      color: var(--gold);
      font-weight: 800;
      font-size: 0.85rem;
    }

    .reminder-list {
      display: grid;
      gap: 9px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .reminder-list li {
      color: var(--muted);
      line-height: 1.55;
    }

    .lodging-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .lodging-list li {
      padding: 12px;
      border-radius: 8px;
      background: rgba(22, 124, 128, 0.06);
      color: var(--muted);
      line-height: 1.55;
    }

    .lodging-list b {
      color: var(--ink);
    }

    .lodging-address {
      margin-top: 3px;
      color: var(--muted);
    }

    @media (max-width: 860px) {
      .hero {
        min-height: 24vh;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .layout > section {
        order: 1;
      }

      .layout > aside {
        order: 2;
      }

      aside {
        position: static;
      }

      .lodging-panel {
        order: 1;
      }

      .route-panel {
        order: 2;
      }

      .reminder-panel {
        order: 3;
      }

      .date-tabs {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px 12px;
      }

      .date-tab {
        justify-self: center;
      }
    }

    @media (max-width: 560px) {
      .hero {
        padding-top: 34px;
        min-height: 20vh;
      }

      h1 {
        font-size: clamp(1.55rem, 8.4vw, 2.35rem);
      }

      .stop-card {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 12px 44px 12px 12px;
      }

      .drag-button {
        top: 12px;
        right: 10px;
        width: 32px;
        height: 32px;
        grid-template-columns: 1fr;
        gap: 0;
        padding: 0;
        border-radius: 10px;
        background: rgba(245, 248, 248, 0.92);
        border-color: rgba(22, 124, 128, 0.13);
        color: rgba(95, 105, 118, 0.78);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86), 0 8px 18px rgba(31, 36, 43, 0.07);
        -webkit-tap-highlight-color: transparent;
      }

      .drag-button::after {
        content: none;
      }

      .drag-button svg {
        width: 17px;
        height: 17px;
      }

      .drag-button:active,
      .stop-card.dragging .drag-button {
        color: var(--accent-strong);
        background: #fff4f5;
        border-color: rgba(204, 63, 85, 0.58);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          0 0 0 4px rgba(204, 63, 85, 0.18),
          0 12px 24px rgba(31, 36, 43, 0.18);
      }

      .stop-card.dragging {
        opacity: 1;
        border-color: rgba(204, 63, 85, 0.92);
        background: #fff7f8;
        box-shadow:
          0 0 0 4px rgba(204, 63, 85, 0.28),
          0 0 0 8px rgba(204, 63, 85, 0.08),
          0 20px 46px rgba(31, 36, 43, 0.22);
      }

      .stop-card.drag-over {
        border-color: rgba(22, 124, 128, 0.92);
        background: #f0fbfb;
        box-shadow:
          0 0 0 4px rgba(22, 124, 128, 0.24),
          0 0 0 8px rgba(22, 124, 128, 0.08),
          0 20px 46px rgba(31, 36, 43, 0.2);
      }

      .time {
        display: flex;
        width: min(124px, calc(100% - 42px));
        min-height: 31px;
        padding: 4px 7px;
        border-radius: 8px;
        align-items: center;
        justify-content: center;
      }

      .time-input {
        width: 64px;
        min-height: 27px;
        font-size: 0.84rem;
      }

      .stop h3 {
        margin-bottom: 5px;
        padding-right: 0;
        font-size: 1rem;
        line-height: 1.28;
      }

      .meta-row {
        gap: 4px;
        margin-bottom: 7px;
      }

      .tag,
      .area-tag,
      .lodging-tag,
      .stay-tag {
        padding: 3px 7px;
        font-size: 0.76rem;
        line-height: 1.25;
      }

      .address,
      .note,
      .hours,
      .memo-display {
        font-size: 0.9rem;
        line-height: 1.48;
      }

      .hours {
        margin-top: 5px;
      }

      .memo-display {
        margin-bottom: 8px;
        padding: 7px 8px;
      }

      .stop-actions {
        gap: 6px;
        margin-top: 9px;
      }

      .button,
      .small-button {
        width: 100%;
      }

      .stop-actions .small-button {
        width: auto;
        min-height: 32px;
        padding: 6px 9px;
        font-size: 0.9rem;
      }

      .date-tabs {

    function dateToHash(date) {
      return "date-" + date.replace("/", "-");
    }

    function hashToDate(hash) {
      return hash.replace(/^#?date-/, "").replace("-", "/");
    }

    function getInitialDate() {
      const dateFromHash = hashToDate(window.location.hash);
      if (dates.includes(dateFromHash)) return dateFromHash;

      const savedDate = window.localStorage.getItem("selectedTravelDate");
      if (dates.includes(savedDate)) return savedDate;

      return "9/18";
    }

    let selectedDate = getInitialDate();

    function mapsSearchUrl(address) {
      if (/^-?\d+(\.\d+)?,-?\d+(\.\d+)?$/.test(address.trim())) {
        return "https://www.google.com/maps?q=" + encodeURIComponent(address.trim()) + "&z=17&hl=ja&region=jp";
      }
      return "https://www.google.com/maps/search/?api=1&hl=ja&region=jp&query=" + encodeURIComponent(address);
    }

    function stopMapUrl(stop) {
      return stop.mapUrl || mapsSearchUrl(stop.mapQuery);
    }

    function routeQuery(stop) {
      return stop.routeQuery || stop.mapQuery || stop.title;
    }

    function navigableRouteStops(stops) {
      return stops.filter((stop, index) => {
        const nextStop = stops[index + 1];
        return !(nextStop && isAirport(stop) && isAirport(nextStop));
      });
    }

    function fullRouteUrl(stops) {
      const routeStops = navigableRouteStops(stops);
      if (routeStops.length < 2) return "";
      const routePath = routeStops
        .map((stop) => encodeURIComponent(routeQuery(stop)))
        .join("/");
      return "https://www.google.com/maps/dir/" + routePath + "/?hl=ja&region=jp";
    }

    function segmentTransitUrl(from, to) {
      return "https://www.google.com/maps/dir/?api=1"
        + "&hl=ja&region=jp"
        + "&origin=" + encodeURIComponent(routeQuery(from))
        + "&destination=" + encodeURIComponent(routeQuery(to))
        + "&travelmode=transit"
        + "&dir_action=navigate";
    }

    function isAirport(stop) {
      return stop.tag.split("·").some((part) => part.trim() === "機場");
    }

    function formatTime(value) {
      const text = value.trim();
      if (!text) return "未定";

      const colonMatch = text.match(/^(\d{1,2})[:：](\d{1,2})$/);
      if (colonMatch) {
        const hour = Math.min(Number(colonMatch[1]), 23);
        const minute = Math.min(Number(colonMatch[2]), 59);
        return String(hour).padStart(2, "0") + ":" + String(minute).padStart(2, "0");
      }

      const digits = text.replace(/\D/g, "");
      if (!digits) return text;

      if (digits.length <= 2) {
        const hour = Math.min(Number(digits), 23);
        return String(hour).padStart(2, "0") + ":00";
      }

      const hour = Math.min(Number(digits.slice(0, -2)), 23);
      const minute = Math.min(Number(digits.slice(-2)), 59);
      return String(hour).padStart(2, "0") + ":" + String(minute).padStart(2, "0");
    }

    function renderStopBadges(stop) {
      const badges = [];
      const seen = new Set();
      const tagParts = stop.tag.split("·").map((part) => part.trim()).filter(Boolean);

      tagParts.forEach((part, index) => {
        if (seen.has(part)) return;
        seen.add(part);
        const className = part.includes("住宿") ? "lodging-tag" : isAreaLabel(part) || index === 1 ? "area-tag" : "tag";
        badges.push(`<span class="${className}" style="${badgeStyle(part)}">${escapeHtml(part)}</span>`);
      });

      if (stop.stay && !seen.has(stop.stay)) {
        const className = stop.stay.includes("住宿") ? "lodging-tag" : "stay-tag";
        badges.push(`<span class="${className}" style="${badgeStyle(stop.stay)}">${escapeHtml(stop.stay)}</span>`);
      }

      return badges.join("");
    }

    function parseTimeToMinutes(time) {
      const match = time.match(/^(\d{2}):(\d{2})$/);
      if (!match) return null;
      return Number(match[1]) * 60 + Number(match[2]);
    }

      if (firstTime !== null && firstTime < 10 * 60) {

    function defaultStopsByTitle() {
      const byTitle = new Map();
      const byMapQuery = new Map();
      dates.forEach((date) => {

          byTitle.set(stop.title, stop);
          byMapQuery.set(stop.mapQuery, stop);

    function syncStopWithDefault(stop, defaults) {
      const titleAliases = {
        "成田國際機場": "成田國際機場第二航廈",
        "原宿居酒屋": "爐端燒 萬年青",
        "MEAT MAN Roppongi": "ミートマン 六本木本店",
      };
      const defaultStop = defaults.byTitle.get(stop.title)
        || defaults.byTitle.get(titleAliases[stop.title])
        || defaults.byMapQuery.get(stop.mapQuery);
      if (!defaultStop) return stop;

      return {
        ...defaultStop,
        time: stop.time || defaultStop.time,
        memo: stop.memo || "",
      };
    }

    function isRemovedSavedStop(date, stop) {
      const removedStopsByDate = {
        "9/12": new Set(["東京車站", "小網神社"]),
      };
      return removedStopsByDate[date]?.has(stop.title);
    }

    function saveItineraries() {
      const savedStops = dates.reduce((result, date) => {
        result[date] = itineraries[date].stops;
        return result;
      }, {});
      window.localStorage.setItem("travelItineraryStops", JSON.stringify(savedStops));
      window.localStorage.setItem("travelItinerarySignature", DEFAULT_ITINERARY_SIGNATURE);
    }

    function loadItineraries() {
      const savedStops = window.localStorage.getItem("travelItineraryStops");
      if (!savedStops) return false;

      const savedSignature = window.localStorage.getItem("travelItinerarySignature");

      try {
        const parsedStops = JSON.parse(savedStops);
        const defaults = defaultStopsByTitle();

        dates.forEach((date) => {
          if (Array.isArray(parsedStops[date])) {
            const savedTitlesForDate = new Set(
              parsedStops[date]
                .filter((stop) => !isRemovedSavedStop(date, stop))
                .map((stop) => stop.title)
            );
            const currentDefaultStops = itineraries[date].stops;
            const mergedStops = [];
            const mergedKeys = new Set();
            parsedStops[date].forEach((stop) => {
              if (isRemovedSavedStop(date, stop)) return;
              const syncedStop = syncStopWithDefault(stop, defaults);
              const key = syncedStop.mapQuery || syncedStop.title;
              if (mergedKeys.has(key)) return;
              mergedKeys.add(key);
              mergedStops.push(syncedStop);
            });
            currentDefaultStops.forEach((defaultStop) => {
              const key = defaultStop.mapQuery || defaultStop.title;
              if (!savedTitlesForDate.has(defaultStop.title) && !mergedKeys.has(key)) {
                mergedKeys.add(key);
                mergedStops.push(defaultStop);
              }
            });
            itineraries[date].stops = mergedStops;
          }
        });
        saveItineraries();
        return true;
      } catch {
        window.localStorage.removeItem("travelItineraryStops");
        return false;
      }
    }

    function stopTimeKeys(stop) {
      return [stop.mapQuery, stop.title].filter(Boolean);
    }

    function saveStopTimes(date = selectedDate) {
      const times = itineraries[date].stops.reduce((result, stop) => {
        stopTimeKeys(stop).forEach((key) => {
          result[key] = stop.time;
        });
        return result;
      }, {});
      window.localStorage.setItem("travelStopTimes-" + date, JSON.stringify(times));
    }

    function loadStopOrder(date) {
      const savedOrder = window.localStorage.getItem("travelStopOrder-" + date);
      if (!savedOrder) return;

      try {
        const order = JSON.parse(savedOrder);
        const stops = itineraries[date].stops;
        if (!Array.isArray(order) || order.length !== stops.length) return;

        const orderedStops = order
          .map((title) => stops.find((stop) => stop.title === title))
          .filter(Boolean);
        if (orderedStops.length === stops.length) {
          itineraries[date].stops = orderedStops;
        }
      } catch {
        window.localStorage.removeItem("travelStopOrder-" + date);
      }
    }

    function loadStopTimes(date) {
      const savedTimes = window.localStorage.getItem("travelStopTimes-" + date);
      if (!savedTimes) return;

      try {
        const times = JSON.parse(savedTimes);
        itineraries[date].stops.forEach((stop) => {
          const savedTime = stopTimeKeys(stop)
            .map((key) => times[key])
            .find((time) => typeof time === "string");
          if (savedTime) {
            stop.time = savedTime;
          }
        });
      } catch {
        window.localStorage.removeItem("travelStopTimes-" + date);
      }
    }

    function syncSavedTimeUpdates(storageKey) {
      const timePrefix = "travelStopTimes-";
      if (storageKey && storageKey.startsWith(timePrefix)) {
        const changedDate = storageKey.slice(timePrefix.length);
        if (dates.includes(changedDate)) {
          loadStopTimes(changedDate);
        }
      } else {
        dates.forEach(loadStopTimes);
      }

      if (!document.activeElement?.classList.contains("time-input")) {
        renderPage();
      }
    }

    function renderActions(stops) {
      const hasRoute = navigableRouteStops(stops).length > 1;

      fullRoute.href = hasRoute ? fullRouteUrl(stops) : "#";
      fullRoute.textContent = hasRoute ? "完整Maps" : "完整Maps";
      fullRoute.setAttribute("aria-disabled", hasRoute ? "false" : "true");
      fullRoute.style.pointerEvents = hasRoute ? "" : "none";
      fullRoute.style.opacity = hasRoute ? "1" : "0.48";

      routePreviewBtn.disabled = !hasRoute;
      routePreviewBtn.style.opacity = hasRoute ? "1" : "0.48";
    }

    function renderPage() {
      const itinerary = itineraries[selectedDate];
      const stops = itinerary.stops;
      const hero = heroFromStops(itinerary, stops);

      document.getElementById("heroEyebrow").textContent = hero.eyebrow;
      document.getElementById("heroTitle").textContent = hero.title;
      document.getElementById("heroDescription").textContent = hero.description;
      document.title = hero.title;
      document.getElementById("timeline-title").textContent = selectedDate + " 行程";
      document.getElementById("routeTitle").textContent = "路線";
      document.getElementById("lodgingTitle").textContent = "住宿";

      renderDateTabs();
      renderTimeline(stops);
      renderRouteList(stops);
      renderLodging(stops);
      renderReminders(stops);
      renderActions(stops);
    }

    function clearDragHighlights() {
      document.querySelectorAll(".stop-card").forEach((card) => {
        card.classList.remove("dragging", "drag-over");
      });
      document.querySelectorAll(".date-tab").forEach((button) => {
        button.classList.remove("drop-target");
      });
    }

    function moveStopWithinDate(targetIndex) {
      if (draggedStopIndex === null) return;
      const stops = itineraries[selectedDate].stops;
      const [movedStop] = stops.splice(draggedStopIndex, 1);
      if (!movedStop) return;
      stops.splice(targetIndex, 0, movedStop);
      saveStopOrder();
      saveStopTimes();
      saveItineraries();
      draggedStopIndex = null;
      draggedSourceDate = null;
      clearDragHighlights();
      renderPage();
    }

    function moveStopToDate(targetDate) {
      if (draggedStopIndex === null || !draggedSourceDate) return;
      const sourceStops = itineraries[draggedSourceDate].stops;
      const targetStops = itineraries[targetDate].stops;
      const [movedStop] = sourceStops.splice(draggedStopIndex, 1);
      if (movedStop) {
        targetStops.push(movedStop);
      }

      saveStopOrder(draggedSourceDate);
      saveStopTimes(draggedSourceDate);
      saveStopOrder(targetDate);
      saveStopTimes(targetDate);
      saveItineraries();

      selectedDate = targetDate;
      window.localStorage.setItem("selectedTravelDate", selectedDate);
      window.history.replaceState(null, "", "#" + dateToHash(selectedDate));
      draggedStopIndex = null;
      draggedSourceDate = null;
      clearDragHighlights();
      renderPage();
    }

    timeline.addEventListener("dragstart", (event) => {
      const handle = event.target.closest(".drag-button");
      if (!handle) {
        event.preventDefault();
        return;
      }
      const card = handle.closest(".stop-card");
      if (!card) return;
      draggedStopIndex = Number(card.dataset.index);
      draggedSourceDate = selectedDate;
      card.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
    });

    timeline.addEventListener("dragover", (event) => {
      const card = event.target.closest(".stop-card");
      if (!card || draggedStopIndex === null) return;
      event.preventDefault();
      card.classList.add("drag-over");
      event.dataTransfer.dropEffect = "move";
    });

    timeline.addEventListener("dragleave", (event) => {
      const card = event.target.closest(".stop-card");
      if (card) card.classList.remove("drag-over");
    });

    timeline.addEventListener("drop", (event) => {
      const card = event.target.closest(".stop-card");
      if (!card || draggedStopIndex === null) return;
      event.preventDefault();

      const targetIndex = Number(card.dataset.index);
      moveStopWithinDate(targetIndex);
    });

    timeline.addEventListener("dragend", () => {
      draggedStopIndex = null;
      draggedSourceDate = null;
      clearDragHighlights();
    });

    dateTabs.addEventListener("dragover", (event) => {
      const button = event.target.closest(".date-tab");
      if (!button || draggedStopIndex === null) return;
      event.preventDefault();
      button.classList.add("drop-target");
      event.dataTransfer.dropEffect = "move";
    });

    dateTabs.addEventListener("dragleave", (event) => {
      const button = event.target.closest(".date-tab");
      if (button) button.classList.remove("drop-target");
    });

    dateTabs.addEventListener("drop", (event) => {
      const button = event.target.closest(".date-tab");
      if (!button || draggedStopIndex === null || !draggedSourceDate) return;
      event.preventDefault();

      moveStopToDate(button.dataset.date);
    });

    timeline.addEventListener("touchstart", (event) => {
      const handle = event.target.closest(".drag-button");
      if (!handle) return;
      const card = handle.closest(".stop-card");
      if (!card) return;

      touchDragActive = true;
      draggedStopIndex = Number(card.dataset.index);
      draggedSourceDate = selectedDate;
      card.classList.add("dragging");
      event.preventDefault();
    }, { passive: false });

    timeline.addEventListener("touchmove", (event) => {
      if (!touchDragActive || draggedStopIndex === null) return;
      const touch = event.touches[0];
      if (!touch) return;
      event.preventDefault();

      clearDragHighlights();
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      const dateButton = target?.closest?.(".date-tab");
      const card = target?.closest?.(".stop-card");
      if (dateButton) {
        dateButton.classList.add("drop-target");
      } else if (card) {
        card.classList.add("drag-over");
      }
    }, { passive: false });

    timeline.addEventListener("touchend", (event) => {
      if (!touchDragActive || draggedStopIndex === null) return;
      const touch = event.changedTouches[0];
      touchDragActive = false;
      if (!touch) {
        draggedStopIndex = null;
        draggedSourceDate = null;
        clearDragHighlights();
        return;
      }

      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      const dateButton = target?.closest?.(".date-tab");
      const card = target?.closest?.(".stop-card");

      if (dateButton) {
        moveStopToDate(dateButton.dataset.date);
      } else if (card) {
        moveStopWithinDate(Number(card.dataset.index));
      } else {
        draggedStopIndex = null;
        draggedSourceDate = null;
        clearDragHighlights();
      }
    });

    timeline.addEventListener("change", (event) => {
      const input = event.target.closest("[data-time-index]");
      if (!input) return;

      const stop = itineraries[selectedDate].stops[Number(input.dataset.timeIndex)];
      stop.time = formatTime(input.value);
      input.value = stop.time;
      saveStopTimes();
      saveItineraries();
      renderRouteList(itineraries[selectedDate].stops);
      renderLodging(itineraries[selectedDate].stops);
      renderReminders(itineraries[selectedDate].stops);
      renderActions(itineraries[selectedDate].stops);
    });

    timeline.addEventListener("click", (event) => {
      const button = event.target.closest("[data-memo-button]");
      if (!button) return;

      activeMemoIndex = Number(button.dataset.memoButton);
      const stop = itineraries[selectedDate].stops[activeMemoIndex];
      memoTextarea.value = stop.memo || "";
      memoModal.classList.add("open");
      memoTextarea.focus();
    });

    function closeMemoModal() {
      memoModal.classList.remove("open");
      activeMemoIndex = null;
    }

    memoSave.addEventListener("click", () => {
      if (activeMemoIndex === null) return;
      const stop = itineraries[selectedDate].stops[activeMemoIndex];
      stop.memo = memoTextarea.value.trim();
      saveItineraries();
      closeMemoModal();
      renderPage();
    });

    memoCancel.addEventListener("click", closeMemoModal);

    memoModal.addEventListener("click", (event) => {
      if (event.target === memoModal) closeMemoModal();
    });

    function closeRouteModal() {
      routeModal.classList.remove("open");
      routeModalList.innerHTML = "";
    }

    function renderRouteModal(stops) {
      const routeStops = navigableRouteStops(stops);
      routeModalList.innerHTML = "";

      routeStops.forEach((stop, index) => {
        const item = document.createElement("div");
        item.className = "route-modal-step";
        item.innerHTML = `
          <span class="route-modal-index">${index === 0 ? "起" : index}</span>
          <span class="route-modal-time">${escapeHtml(stop.time || "未定")}</span>
          <span>
            <span class="route-modal-title">${escapeHtml(stop.title)}</span>
            <span class="route-modal-tags">${renderStopBadges(stop)}</span>
            <p>${escapeHtml(stop.address)}</p>
          </span>
        `;
        routeModalList.appendChild(item);
      });
    }

    routePanelToggle.addEventListener("click", () => {
      const panel = routePanelToggle.closest(".route-panel");
      const isOpen = panel.classList.toggle("open");
      routePanelToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
    });

    routePreviewBtn.addEventListener("click", () => {
      const stops = itineraries[selectedDate].stops;
      if (navigableRouteStops(stops).length < 2) return;
      renderRouteModal(stops);
      routeModal.classList.add("open");
    });

    routeModalClose.addEventListener("click", closeRouteModal);

    routeModal.addEventListener("click", (event) => {
      if (event.target === routeModal) closeRouteModal();
    });

    window.addEventListener("storage", (event) => {
      if (!event.key) return;

      if (event.key.startsWith("travelStopTimes-")) {
        syncSavedTimeUpdates(event.key);
      }

      if (event.key === "travelItineraryStops") {
        loadItineraries();
        syncSavedTimeUpdates();
      }
    });

    if (window.location.hash !== "#" + dateToHash(selectedDate)) {
      window.history.replaceState(null, "", "#" + dateToHash(selectedDate));
    }

    if (!loadItineraries()) {
      dates.forEach(loadStopOrder);
    }
    dates.forEach(loadStopTimes);
    renderPage();

  </script>
</body>
</html>
